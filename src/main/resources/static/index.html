<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cinema — Repertuar</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --border: #242424;
      --accent: #c8a96e;
      --accent-dark: #a8893e;
      --text: #f0ece4;
      --text-muted: #6b6560;
      --text-sub: #9a9590;
      --error: #e05c5c;
      --radius: 6px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }


    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,13,13,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }

    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
    }

    .nav-logo svg { color: var(--accent); }

    .nav-logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 18px; letter-spacing: 0.1em;
      color: var(--text);
    }

    .nav-right {
      display: flex; align-items: center; gap: 20px;
    }

    .nav-username {
      font-size: 13px; color: var(--text-sub);
    }

    .nav-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 14px;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .nav-btn:hover { border-color: var(--accent); color: var(--accent); }


    .hero {
      padding: 60px 40px 40px;
      border-bottom: 1px solid var(--border);
      background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(200,169,110,0.06) 0%, transparent 60%);
    }

    .hero-label {
      font-size: 11px; font-family: monospace;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 12px;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 4vw, 46px);
      font-weight: 400; color: var(--text);
    }


    main { padding: 40px; max-width: 1240px; margin: 0 auto; }

    .movies-count {
      font-size: 12px; color: var(--text-muted);
      font-family: monospace; margin-bottom: 24px;
    }

    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
    }


    .movie-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden; cursor: pointer;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    }
    .movie-card:hover {
      transform: translateY(-6px);
      border-color: var(--accent);
      box-shadow: 0 20px 40px rgba(200,169,110,0.1);
    }

    .movie-poster {
      width: 100%; aspect-ratio: 2/3;
      background: #1a1a1a; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }

    .movie-poster img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.4s ease;
    }
    .movie-card:hover .movie-poster img { transform: scale(1.05); }

    .poster-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; padding: 20px;
      font-family: monospace; font-size: 12px;
      color: rgba(255,255,255,0.4);
      text-align: center; line-height: 1.4;
    }

    .movie-info { padding: 14px; }

    .movie-title {
      font-family: 'Playfair Display', serif;
      font-size: 14px; color: var(--text);
      margin-bottom: 6px; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .movie-meta {
      display: flex; align-items: center; gap: 8px;
      flex-wrap: wrap;
    }

    .movie-genre {
      font-size: 11px; font-family: monospace;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--accent);
    }

    .movie-duration {
      font-size: 11px; color: var(--text-muted);
      display: flex; align-items: center; gap: 4px;
    }

    .movie-desc {
      font-size: 12px; color: var(--text-muted);
      margin-top: 8px; line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }


    .skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .skeleton-poster {
      width: 100%; aspect-ratio: 2/3;
      background: #1a1a1a; animation: pulse 1.5s ease infinite;
    }
    .skeleton-line {
      background: #1a1a1a; border-radius: 2px;
      animation: pulse 1.5s ease infinite;
    }
    .skeleton-info { padding: 14px; }

    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
    }


    .alert {
      padding: 14px 18px; border-radius: var(--radius);
      font-size: 13px; margin-bottom: 24px; display: none;
    }
    .alert.error {
      background: rgba(224,92,92,.08);
      border: 1px solid rgba(224,92,92,.2);
      color: var(--error);
    }
    .alert.show { display: block; }


    .empty {
      text-align: center; padding: 80px 0;
      color: var(--text-muted); display: none;
    }
    .empty.show { display: block; }
    .empty p { font-family: monospace; font-size: 13px; margin-top: 12px; }


    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      max-width: 520px; width: 100%;
      overflow: hidden;
      transform: translateY(12px);
      transition: transform 0.2s;
    }
    .modal-overlay.show .modal { transform: translateY(0); }

    .modal-header {
      padding: 24px 24px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: flex-start;
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px; font-weight: 400; color: var(--text);
      margin-bottom: 6px;
    }

    .modal-meta { display: flex; gap: 12px; align-items: center; }

    .modal-close {
      background: none; border: 1px solid var(--border);
      color: var(--text-muted); cursor: pointer;
      width: 32px; height: 32px; border-radius: var(--radius);
      font-size: 18px; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
    }
    .modal-close:hover { border-color: var(--accent); color: var(--accent); }

    .modal-body { padding: 20px 24px 24px; }

    .modal-desc {
      color: var(--text-sub); font-size: 14px;
      line-height: 1.7; margin-bottom: 20px;
    }

    .modal-btn {
      width: 100%; padding: 13px;
      background: var(--accent); color: #0d0d0d;
      border: none; border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      letter-spacing: 0.07em; text-transform: uppercase;
      cursor: pointer; transition: background 0.2s;
    }
    .modal-btn:hover { background: var(--accent-dark); }
  </style>
</head>
<body>


<nav>
  <a class="nav-logo" href="index.html">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="2" y="2" width="20" height="20" rx="2.18"/>
      <line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/>
      <line x1="2" y1="12" x2="22" y2="12"/>
      <line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/>
      <line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/>
    </svg>
    <span class="nav-logo-text">CINEMA</span>
  </a>
  <div class="nav-right">
    <span class="nav-username" id="navUsername"></span>
    <a href="admin.html" class="nav-btn" id="adminBtn" style="display:none">Panel admina</a>
    <a href="reservations.html" class="nav-btn">Moje rezerwacje</a>
    <button class="nav-btn" onclick="logout()">Wyloguj</button>
  </div>
</nav>


<div class="hero">
  <p class="hero-label">Repertuar</p>
  <h1 class="hero-title">Co dziś gramy</h1>
</div>


<main>
  <div class="alert error" id="errorAlert"></div>

  <p class="movies-count" id="moviesCount"></p>

  <div class="movies-grid" id="moviesGrid"></div>

  <div class="empty" id="emptyState">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3">
      <rect x="2" y="2" width="20" height="20" rx="2.18"/>
      <line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/>
      <line x1="2" y1="12" x2="22" y2="12"/>
    </svg>
    <p>Brak filmów w repertuarze</p>
  </div>
</main>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-meta">
          <span class="movie-genre" id="modalGenre"></span>
          <span class="movie-duration" id="modalDuration"></span>
        </div>
      </div>
      <button class="modal-close" onclick="hideModal()">×</button>
    </div>
    <div class="modal-body">
      <p class="modal-desc" id="modalDesc"></p>
      <button class="modal-btn" id="modalBtn">Zobacz seanse</button>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:8080/api';
  const token = localStorage.getItem('token');


  if (!token) window.location.href = 'auth.html';

if (localStorage.getItem('role') === 'ADMIN') {
    document.getElementById('adminBtn').style.display = 'inline-block';
}
  document.getElementById('navUsername').textContent = localStorage.getItem('username') || '';

  async function loadMovies() {
    const grid = document.getElementById('moviesGrid');

    grid.innerHTML = Array.from({ length: 8 }).map(() => `
      <div class="skeleton">
        <div class="skeleton-poster"></div>
        <div class="skeleton-info">
          <div class="skeleton-line" style="height:14px;margin-bottom:8px"></div>
          <div class="skeleton-line" style="height:11px;width:60%"></div>
        </div>
      </div>
    `).join('');

    try {
      const res = await fetch(`${API}/movies`, {
        headers: { Authorization: `Bearer ${token}` }
      });

      if (res.status === 401) { logout(); return; }
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const movies = await res.json();
      renderMovies(movies);

    } catch (err) {
      grid.innerHTML = '';
      const alert = document.getElementById('errorAlert');
      alert.textContent = 'Nie udało się pobrać filmów.';
      alert.classList.add('show');
    }
  }

  function renderMovies(movies) {
    const grid = document.getElementById('moviesGrid');
    const count = document.getElementById('moviesCount');
    const empty = document.getElementById('emptyState');

    if (movies.length === 0) {
      grid.innerHTML = '';
      empty.classList.add('show');
      return;
    }

    count.textContent = `${movies.length} ${movies.length === 1 ? 'film' : 'filmów'}`;

    grid.innerHTML = movies.map(movie => `
      <div class="movie-card" onclick="openModal(${movie.id})">
        <div class="movie-poster">
          ${movie.posterUrl
            ? `<img src="${escapeHtml(movie.posterUrl)}" alt="${escapeHtml(movie.title)}" loading="lazy" />`
            : posterPlaceholder(movie.title)
    }
        </div>
        <div class="movie-info">
          <div class="movie-title">${escapeHtml(movie.title)}</div>
          <div class="movie-meta">
            ${movie.genre ? `<span class="movie-genre">${escapeHtml(movie.genre)}</span>` : ''}
            ${movie.genre && movie.durationMinutes ? '<span style="color:#333">·</span>' : ''}
            ${movie.durationMinutes ? `<span class="movie-duration">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
              ${movie.durationMinutes} min
            </span>` : ''}
          </div>
          ${movie.description ? `<p class="movie-desc">${escapeHtml(movie.description)}</p>` : ''}
        </div>
      </div>
    `).join('');

    window._movies = movies;
  }

  function openModal(movieId) {
    const movie = window._movies.find(m => m.id === movieId);
    if (!movie) return;

    document.getElementById('modalTitle').textContent = movie.title;
    document.getElementById('modalGenre').textContent = movie.genre || '';
    document.getElementById('modalDuration').textContent = movie.durationMinutes ? `${movie.durationMinutes} min` : '';
    document.getElementById('modalDesc').textContent = movie.description || 'Brak opisu';
    document.getElementById('modalBtn').onclick = () => {
      window.location.href = `screenings.html?movieId=${movie.id}`;
    };

    document.getElementById('modalOverlay').classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function hideModal() {
    document.getElementById('modalOverlay').classList.remove('show');
    document.body.style.overflow = '';
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay')) hideModal();
  }


  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') hideModal();
  });



  function escapeHtml(str) {
    if (!str) return '';
    return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
  }

  function posterPlaceholder(title) {
    const colors = [
      ['#1a1a2e','#c8a96e'], ['#0f3460','#533483'],
      ['#16213e','#0f3460'], ['#1b1b2f','#e43f5a'],
    ];
    const [bg, accent] = colors[title.charCodeAt(0) % colors.length];
    return `<div class="poster-placeholder" style="background:linear-gradient(135deg,${bg},${accent})">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="2" width="20" height="20" rx="2.18"/>
        <line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
      </svg>
      <span>${escapeHtml(title)}</span>
    </div>`;
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('username');
    localStorage.removeItem('role');
    window.location.href = 'auth.html';
  }


  loadMovies();
</script>
</body>
</html>
